<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Experience</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 40px;
    }
    img {
        width: 300px;
        cursor: pointer;
    }
    #duration {
        font-size: 20px;
        margin-top: 15px;
        font-weight: bold;
    }
</style>
</head>
<body>

<h2>Click my image below to hear my message to you!</h2>
<!--h4>Press "Play" when new tab appears.</h4-->
<h2><i>"My Experience"</i></h2>
<!-- Your image -->

<!-- The clickable image -->
<img src="Red sweatshirt heads.png"
     alt="Click to play audio"
     style="cursor:pointer;"
     onclick="document.getElementById('myAudio').play();">

<!-- Hidden audio player -->
<audio id="myAudio">
  <source src="myExperience.m4a" type="audio/mp4">
</audio>

<!-- Where the duration will appear -->
<div id="audioLength" style="margin-top:10px; font-weight:bold;"></div>

<script>
  const audio = document.getElementById('myAudio');
  const display = document.getElementById('audioLength');

  audio.addEventListener('loadedmetadata', () => {
    const totalSeconds = Math.floor(audio.duration);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;

    display.textContent = `Length: ${minutes}:${seconds.toString().padStart(2, '0')}`;
  });
</script>
<!-- Where the duration will appear -->

<h4>
Take look at these additional <a href="https://byrondbacon.github.io/myContent/#resources" target="forreal">videos</a> on my site by expanding the "Intro Videos" section under the "Resources" heading.
Explore the rest of the site, if any of this this sparks an interest.

</h4>
</body>
</html>
